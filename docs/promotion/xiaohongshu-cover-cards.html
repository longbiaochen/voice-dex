<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ChatType Xiaohongshu Cover Cards</title>
  <style>
    :root {
      --ink: #111827;
      --muted: #53606f;
      --line: #d8dee8;
      --blue: #2f80ed;
      --green: #10a37f;
      --yellow: #f7c948;
      --paper: #fbfcff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 32px;
      background: #eef2f7;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", sans-serif;
      color: var(--ink);
    }
    .wrap {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 24px;
      align-items: start;
    }
    .card {
      width: 300px;
      aspect-ratio: 3 / 4;
      padding: 26px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: var(--paper);
      box-shadow: 0 18px 50px rgba(21, 33, 54, 0.13);
      position: relative;
      overflow: hidden;
    }
    .card::after {
      content: "";
      position: absolute;
      width: 220px;
      height: 220px;
      right: -90px;
      bottom: -90px;
      border-radius: 50%;
      background: rgba(47, 128, 237, 0.08);
    }
    .label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      font-size: 13px;
      color: var(--muted);
      background: #fff;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
    }
    h1 {
      margin: 28px 0 18px;
      font-size: 34px;
      line-height: 1.08;
      letter-spacing: 0;
    }
    .accent {
      color: var(--blue);
    }
    .sub {
      max-width: 220px;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.55;
    }
    .flow {
      position: absolute;
      left: 26px;
      right: 26px;
      bottom: 28px;
      z-index: 1;
      display: grid;
      gap: 10px;
    }
    .step {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 42px;
      padding: 0 12px;
      border-radius: 12px;
      background: #fff;
      border: 1px solid var(--line);
      font-size: 15px;
      font-weight: 650;
    }
    .key {
      min-width: 34px;
      height: 28px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      color: #fff;
      background: var(--ink);
      font-size: 13px;
    }
    .green h1 .accent { color: var(--green); }
    .yellow h1 .accent { color: #b7791f; }
    .yellow::after { background: rgba(247, 201, 72, 0.16); }
    .green::after { background: rgba(16, 163, 127, 0.1); }
    @media print {
      body { background: #fff; }
      .card { break-inside: avoid; box-shadow: none; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <article class="card">
      <div class="label"><span class="dot"></span> ChatType / macOS</div>
      <h1>我受够了在 <span class="accent">Codex</span> 里手打长句</h1>
      <p class="sub">按 F5 说话，再按 F5 停止。能回填就回填，不安全就放剪贴板。</p>
      <div class="flow">
        <div class="step"><span>Start recording</span><span class="key">F5</span></div>
        <div class="step"><span>Stop and paste</span><span class="key">F5</span></div>
      </div>
    </article>
    <article class="card green">
      <div class="label"><span class="dot"></span> 30 秒演示</div>
      <h1><span class="accent">F5</span> 录音<br>F5 停止<br>结果到光标</h1>
      <p class="sub">给已经登录 ChatGPT/Codex Desktop 的 Mac 用户。</p>
      <div class="flow">
        <div class="step"><span>Speak</span><span>录音中</span></div>
        <div class="step"><span>Paste</span><span>可编辑才回填</span></div>
      </div>
    </article>
    <article class="card yellow">
      <div class="label"><span class="dot"></span> 独立开发</div>
      <h1>为什么我只给它设计了 <span class="accent">一个按键</span></h1>
      <p class="sub">它不是全能听写平台，只解决说话到输入框这一步。</p>
      <div class="flow">
        <div class="step"><span>One trigger</span><span class="key">F5</span></div>
        <div class="step"><span>Open source</span><span>GitHub</span></div>
      </div>
    </article>
  </div>
</body>
</html>
