<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1200" viewBox="0 0 900 1200" role="img" aria-labelledby="title desc">
  <title id="title">ChatType Xiaohongshu cover: demo</title>
  <desc id="desc">A Xiaohongshu cover card for ChatType showing the F5 recording demo.</desc>
  <rect width="900" height="1200" fill="#eef2f7"/>
  <rect x="74" y="74" width="752" height="1052" rx="52" fill="#fbfcff" stroke="#d8dee8" stroke-width="3"/>
  <circle cx="716" cy="990" r="250" fill="#10a37f" opacity="0.10"/>
  <rect x="136" y="132" width="220" height="72" rx="36" fill="#ffffff" stroke="#d8dee8" stroke-width="3"/>
  <circle cx="170" cy="168" r="10" fill="#10a37f"/>
  <text x="200" y="178" font-family="-apple-system, BlinkMacSystemFont, PingFang SC, sans-serif" font-size="28" fill="#53606f">30 秒演示</text>
  <text x="136" y="334" font-family="-apple-system, BlinkMacSystemFont, PingFang SC, sans-serif" font-size="90" font-weight="850" fill="#10a37f">F5</text>
  <text x="270" y="334" font-family="-apple-system, BlinkMacSystemFont, PingFang SC, sans-serif" font-size="82" font-weight="850" fill="#111827">录音</text>
  <text x="136" y="444" font-family="-apple-system, BlinkMacSystemFont, PingFang SC, sans-serif" font-size="82" font-weight="850" fill="#111827">F5 停止</text>
  <text x="136" y="554" font-family="-apple-system, BlinkMacSystemFont, PingFang SC, sans-serif" font-size="82" font-weight="850" fill="#111827">结果到光标</text>
  <text x="136" y="690" font-family="-apple-system, BlinkMacSystemFont, PingFang SC, sans-serif" font-size="38" fill="#53606f">给已经登录 ChatGPT/Codex</text>
  <text x="136" y="748" font-family="-apple-system, BlinkMacSystemFont, PingFang SC, sans-serif" font-size="38" fill="#53606f">Desktop 的 Mac 用户。</text>
  <rect x="136" y="850" width="628" height="94" rx="24" fill="#ffffff" stroke="#d8dee8" stroke-width="3"/>
  <text x="168" y="910" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="34" font-weight="700" fill="#111827">Speak</text>
  <text x="620" y="910" font-family="-apple-system, BlinkMacSystemFont, PingFang SC, sans-serif" font-size="34" font-weight="700" fill="#111827">录音中</text>
  <rect x="136" y="970" width="628" height="94" rx="24" fill="#ffffff" stroke="#d8dee8" stroke-width="3"/>
  <text x="168" y="1030" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="34" font-weight="700" fill="#111827">Paste</text>
  <text x="556" y="1030" font-family="-apple-system, BlinkMacSystemFont, PingFang SC, sans-serif" font-size="34" font-weight="700" fill="#111827">可编辑才回填</text>
</svg>
