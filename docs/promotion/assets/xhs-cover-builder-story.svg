<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1200" viewBox="0 0 900 1200" role="img" aria-labelledby="title desc">
  <title id="title">ChatType Xiaohongshu cover: builder story</title>
  <desc id="desc">A Xiaohongshu cover card for ChatType explaining the one-key product choice.</desc>
  <rect width="900" height="1200" fill="#eef2f7"/>
  <rect x="74" y="74" width="752" height="1052" rx="52" fill="#fbfcff" stroke="#d8dee8" stroke-width="3"/>
  <circle cx="716" cy="990" r="250" fill="#f7c948" opacity="0.16"/>
  <rect x="136" y="132" width="220" height="72" rx="36" fill="#ffffff" stroke="#d8dee8" stroke-width="3"/>
  <circle cx="170" cy="168" r="10" fill="#10a37f"/>
  <text x="200" y="178" font-family="-apple-system, BlinkMacSystemFont, PingFang SC, sans-serif" font-size="28" fill="#53606f">独立开发</text>
  <text x="136" y="320" font-family="-apple-system, BlinkMacSystemFont, PingFang SC, sans-serif" font-size="74" font-weight="850" fill="#111827">为什么我只给它</text>
  <text x="136" y="416" font-family="-apple-system, BlinkMacSystemFont, PingFang SC, sans-serif" font-size="74" font-weight="850" fill="#111827">设计了</text>
  <text x="368" y="416" font-family="-apple-system, BlinkMacSystemFont, PingFang SC, sans-serif" font-size="82" font-weight="850" fill="#b7791f">一个按键</text>
  <text x="136" y="594" font-family="-apple-system, BlinkMacSystemFont, PingFang SC, sans-serif" font-size="38" fill="#53606f">它不是全能听写平台，</text>
  <text x="136" y="652" font-family="-apple-system, BlinkMacSystemFont, PingFang SC, sans-serif" font-size="38" fill="#53606f">只解决说话到输入框这一步。</text>
  <rect x="136" y="824" width="628" height="94" rx="24" fill="#ffffff" stroke="#d8dee8" stroke-width="3"/>
  <text x="168" y="884" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="34" font-weight="700" fill="#111827">One trigger</text>
  <rect x="678" y="845" width="64" height="52" rx="14" fill="#111827"/>
  <text x="696" y="881" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="26" font-weight="700" fill="#ffffff">F5</text>
  <rect x="136" y="944" width="628" height="94" rx="24" fill="#ffffff" stroke="#d8dee8" stroke-width="3"/>
  <text x="168" y="1004" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="34" font-weight="700" fill="#111827">Open source</text>
  <text x="634" y="1004" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="34" font-weight="700" fill="#111827">GitHub</text>
</svg>
