<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1200" viewBox="0 0 900 1200" role="img" aria-labelledby="title desc">
  <title id="title">ChatType Xiaohongshu cover: pain point</title>
  <desc id="desc">A Xiaohongshu cover card for ChatType, focused on typing long Codex prompts by voice.</desc>
  <rect width="900" height="1200" fill="#eef2f7"/>
  <rect x="74" y="74" width="752" height="1052" rx="52" fill="#fbfcff" stroke="#d8dee8" stroke-width="3"/>
  <circle cx="724" cy="1010" r="250" fill="#2f80ed" opacity="0.08"/>
  <rect x="136" y="132" width="280" height="72" rx="36" fill="#ffffff" stroke="#d8dee8" stroke-width="3"/>
  <circle cx="170" cy="168" r="10" fill="#10a37f"/>
  <text x="200" y="178" font-family="-apple-system, BlinkMacSystemFont, PingFang SC, sans-serif" font-size="28" fill="#53606f">ChatType / macOS</text>
  <text x="136" y="316" font-family="-apple-system, BlinkMacSystemFont, PingFang SC, sans-serif" font-size="76" font-weight="800" fill="#111827">我受够了在</text>
  <text x="136" y="414" font-family="-apple-system, BlinkMacSystemFont, PingFang SC, sans-serif" font-size="86" font-weight="850" fill="#2f80ed">Codex</text>
  <text x="392" y="414" font-family="-apple-system, BlinkMacSystemFont, PingFang SC, sans-serif" font-size="76" font-weight="800" fill="#111827">里手打</text>
  <text x="136" y="512" font-family="-apple-system, BlinkMacSystemFont, PingFang SC, sans-serif" font-size="76" font-weight="800" fill="#111827">长句</text>
  <text x="136" y="636" font-family="-apple-system, BlinkMacSystemFont, PingFang SC, sans-serif" font-size="38" fill="#53606f">按 F5 说话，再按 F5 停止。</text>
  <text x="136" y="694" font-family="-apple-system, BlinkMacSystemFont, PingFang SC, sans-serif" font-size="38" fill="#53606f">能回填就回填，不安全就放剪贴板。</text>
  <rect x="136" y="824" width="628" height="94" rx="24" fill="#ffffff" stroke="#d8dee8" stroke-width="3"/>
  <text x="168" y="884" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="34" font-weight="700" fill="#111827">Start recording</text>
  <rect x="678" y="845" width="64" height="52" rx="14" fill="#111827"/>
  <text x="696" y="881" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="26" font-weight="700" fill="#ffffff">F5</text>
  <rect x="136" y="944" width="628" height="94" rx="24" fill="#ffffff" stroke="#d8dee8" stroke-width="3"/>
  <text x="168" y="1004" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="34" font-weight="700" fill="#111827">Stop and paste</text>
  <rect x="678" y="965" width="64" height="52" rx="14" fill="#111827"/>
  <text x="696" y="1001" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="26" font-weight="700" fill="#ffffff">F5</text>
</svg>
